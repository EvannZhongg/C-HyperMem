llm:
  provider: openai_compatible
  model: ${CHYPERMEM_LLM_MODEL}
  base_url: ${CHYPERMEM_LLM_BASE_URL}
  api_key: ${CHYPERMEM_LLM_API_KEY}
  retry_attempts: 5
  retry_backoff_base_sec: 2
  retry_backoff_max_sec: 60

embedding:
  provider: openai_compatible
  model: ${CHYPERMEM_EMBEDDING_MODEL}
  base_url: ${CHYPERMEM_EMBEDDING_BASE_URL}
  api_key: ${CHYPERMEM_EMBEDDING_API_KEY}
  batch_size: 10
  retry_attempts: 5
  retry_backoff_base_sec: 2
  retry_backoff_max_sec: 60
